<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Editor - Timeline Control</title>
    <style>
        :root { --accent: #f39c12; --bg: #0e0e0e; --panel: #1a1a1a; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Cinema Preview */
        #preview-container { flex: 2; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        canvas { width: 90%; max-width: 850px; aspect-ratio: 16/9; background: #111; border-radius: 8px; border: 1px solid #333; }

        /* YouTube-like Seekbar */
        .controls-bar { width: 90%; max-width: 850px; margin-top: 10px; display: flex; align-items: center; gap: 10px; }
        #seekbar { flex: 1; accent-color: var(--accent); cursor: pointer; }
        #time-display { font-family: monospace; font-size: 14px; min-width: 80px; }

        /* Timeline & Frames */
        #timeline-zone { height: 180px; background: var(--panel); border-top: 2px solid #333; overflow-x: auto; padding: 10px; position: relative; }
        .track { height: 45px; background: rgba(255,255,255,0.03); margin-bottom: 5px; position: relative; border-radius: 4px; display: flex; align-items: center; }
        .frame-preview { height: 40px; width: 70px; background: #333; border: 1px solid #000; display: inline-block; background-size: cover; }
        
        /* Playhead (Crvena linija) */
        #playhead { position: absolute; top: 0; left: 0; width: 2px; height: 100%; background: red; z-index: 100; pointer-events: none; }

        .toolbar { background: #111; padding: 15px; display: flex; gap: 10px; justify-content: center; border-top: 1px solid #333; }
        button { background: #333; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: var(--accent); color: black; }
        .btn-play { background: var(--accent); color: black; padding: 10px 25px; }
    </style>
</head>
<body>

<div id="preview-container">
    <canvas id="mainCanvas"></canvas>
    <video id="vSource" style="display:none;" crossorigin="anonymous"></video>
    
    <div class="controls-bar">
        <button class="btn-play" id="playBtn">▶ PAUSE / PLAY</button>
        <input type="range" id="seekbar" value="0" step="0.1">
        <div id="time-display">00:00</div>
    </div>
</div>

<div class="toolbar">
    <label for="vIn" style="cursor:pointer; background:#444; padding:10px; border-radius:6px;">📂 UBACI VIDEO</label>
    <input type="file" id="vIn" accept="video/*" style="display:none;">
    <input type="text" id="overlayText" placeholder="Tekst (max 2s)..." style="padding:10px; border-radius:6px; border:none; background:#222; color:white;">
    <button onclick="setVoice(1.5)">🐿️ PISKAV</button>
    <button onclick="setVoice(0.7)">👹 GRUB</button>
    <button id="saveBtn" style="background:#27ae60;">💾 EXPORT</button>
</div>

<div id="timeline-zone">
    <div id="playhead"></div>
    <div class="track" id="frame-track"></div>
    <div class="track" id="text-track"></div>
</div>

<script>
    const video = document.getElementById('vSource');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const seekbar = document.getElementById('seekbar');
    const timeDisplay = document.getElementById('time-display');
    const playBtn = document.getElementById('playBtn');
    const playhead = document.getElementById('playhead');
    const textInput = document.getElementById('overlayText');

    let textStartTime = -1;
    let biquadFilter, audioCtx;

    // --- UČITAVANJE ---
    document.getElementById('vIn').onchange = (e) => {
        const file = e.target.files[0];
        video.src = URL.createObjectURL(file);
        video.onloadedmetadata = () => {
            seekbar.max = video.duration;
            generateFrames();
            setupAudio();
            render();
        };
    };

    // --- GENERISANJE FREJMOVA (Sličice dole) ---
    function generateFrames() {
        const frameTrack = document.getElementById('frame-track');
        frameTrack.innerHTML = "";
        const numFrames = Math.floor(video.duration);
        for(let i=0; i<numFrames; i++) {
            const f = document.createElement('div');
            f.className = 'frame-preview';
            f.style.width = "50px";
            f.innerText = i + "s";
            frameTrack.appendChild(f);
        }
    }

    // --- KONTROLE (YouTube style) ---
    playBtn.onclick = () => {
        if(video.paused) { video.play(); } 
        else { video.pause(); }
    };

    seekbar.oninput = () => {
        video.currentTime = seekbar.value;
    };

    video.ontimeupdate = () => {
        seekbar.value = video.currentTime;
        const mins = Math.floor(video.currentTime / 60);
        const secs = Math.floor(video.currentTime % 60);
        timeDisplay.innerText = `${mins}:${secs < 10 ? '0'+secs : secs}`;
        
        // Pomeranje crvene linije na timeline-u
        const pos = (video.currentTime / video.duration) * document.getElementById('timeline-zone').scrollWidth;
        playhead.style.left = pos + "px";
    };

    // --- TEKST LOGIKA (Maks 2 sekunde) ---
    textInput.oninput = () => {
        if(textInput.value.length > 0) {
            textStartTime = video.currentTime; // Tekst počinje tamo gde je video sad
        } else {
            textStartTime = -1;
        }
    };

    function setupAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaElementSource(video);
        biquadFilter = audioCtx.createBiquadFilter();
        source.connect(biquadFilter);
        biquadFilter.connect(audioCtx.destination);
    }

    function setVoice(p) { video.playbackRate = p; biquadFilter.frequency.value = p > 1 ? 2500 : 500; }

    // --- RENDER ---
    function render() {
        canvas.width = 1280; canvas.height = 720;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        // Provera da li tekst treba da se prikaže (traje 2 sekunde od momenta kucanja)
        if(textStartTime !== -1 && video.currentTime >= textStartTime && video.currentTime <= textStartTime + 2) {
            ctx.fillStyle = "white";
            ctx.font = "bold 60px sans-serif";
            ctx.textAlign = "center";
            ctx.shadowColor = "black";
            ctx.shadowBlur = 10;
            ctx.fillText(textInput.value, canvas.width/2, canvas.height - 100);
        }

        requestAnimationFrame(render);
    }

    document.getElementById('saveBtn').onclick = () => {
        const stream = canvas.captureStream(30);
        const recorder = new MediaRecorder(stream);
        let chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, {type: 'video/mp4'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'moj_pro_edit.mp4'; a.click();
        };
        recorder.start();
        video.currentTime = 0;
        video.play();
        video.onended = () => recorder.stop();
    };
</script>
</body>
</html>
