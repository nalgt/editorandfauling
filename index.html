<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GGLOL Pro Studio - Ultimate Edition</title>
    <style>
        :root { --accent: #f39c12; --bg: #0b0b0b; --cut: #e74c3c; --ai: #9b59b6; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #preview-zone { flex: 1; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 10px; }
        canvas { max-width: 100%; max-height: 50vh; background:#111; border-radius:8px; border: 2px solid #333; }
        .controls-container { background:#111; padding:10px; border-top: 1px solid #333; }
        .mixer-panel { background: #1a1a1a; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; flex-direction: column; gap: 8px; }
        .mixer-row { display: flex; align-items: center; gap: 10px; font-size: 11px; }
        input[type="range"] { flex: 1; accent-color: var(--accent); }
        .toolbar { display:grid; grid-template-columns: repeat(4, 1fr); gap:5px; }
        button, label { background:#222; color:white; border:1px solid #444; padding:12px 2px; border-radius:8px; cursor:pointer; font-weight:bold; font-size:10px; text-align: center; }
        #ai-box { display: flex; gap: 5px; margin-bottom: 8px; }
        #aiText { flex: 1; padding: 8px; border-radius: 5px; border: none; background: #333; color: white; }
    </style>
</head>
<body>

<div id="preview-zone">
    <canvas id="mainCanvas"></canvas>
    <video id="vSource" style="display:none;" playsinline crossorigin="anonymous"></video>
    <audio id="aSource" style="display:none;" crossorigin="anonymous" loop></audio>
    <div style="width:100%; display:flex; align-items:center; gap:10px; margin-top: 10px;">
        <button onclick="togglePlay()" id="playBtn" style="background:var(--accent); color:black; border:none; padding:10px 20px; border-radius:5px; font-weight:bold;">▶ PUSTI</button>
        <input type="range" id="seekbar" value="0" step="0.01" style="flex:1;">
        <span id="timer">0.0s</span>
    </div>
</div>

<div class="controls-container">
    <div id="ai-box">
        <input type="text" id="aiText" placeholder="AI tekst...">
        <button onclick="addAI()" style="background:var(--ai); border:none; color:white; padding:0 15px; border-radius:5px;">DODAJ AI</button>
    </div>

    <div class="mixer-panel">
        <div class="mixer-row">🔊 VIDEO: <input type="range" id="vVol" min="0" max="1" step="0.1" value="1" oninput="mix()"></div>
        <div class="mixer-row">🎶 MP3 VOL: <input type="range" id="aVol" min="0" max="1" step="0.1" value="0.5" oninput="mix()"></div>
        <label style="font-size:10px;"><input type="checkbox" id="outroOn"> Pokaži TheFatRat Outro</label>
    </div>

    <div class="toolbar">
        <label for="vIn">📂 VIDEO</label> <input type="file" id="vIn" accept="video/*" style="display:none;">
        <label for="aIn" style="color:var(--accent);">🎵 MP3</label> <input type="file" id="aIn" accept="audio/*" style="display:none;">
        <button onclick="setCut('start')">📍 OD</button>
        <button onclick="setCut('end')">📍 DO</button>
        <button onclick="applyCut()" style="background:var(--cut);">✂️ SEČI</button>
        <button onclick="undo()">↩️ UNDO</button>
        <button onclick="video.currentTime = 0">🔄 RESET</button>
        <button onclick="alert('Snimanje spremno!')" style="background:#2ecc71; color:black;">💾 SNIMI</button>
    </div>
</div>

<script>
    const video = document.getElementById('vSource');
    const audio = document.getElementById('aSource');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const seekbar = document.getElementById('seekbar');
    let cuts = [], aiMsgs = [], startP = -1, endP = -1;

    document.getElementById('vIn').onchange = (e) => {
        video.src = URL.createObjectURL(e.target.files[0]);
        video.onloadedmetadata = () => { canvas.width = video.videoWidth; canvas.height = video.videoHeight; seekbar.max = video.duration; };
    };
    document.getElementById('aIn').onchange = (e) => { audio.src = URL.createObjectURL(e.target.files[0]); audio.loop = true; };

    function mix() { video.volume = document.getElementById('vVol').value; audio.volume = document.getElementById('aVol').value; }
    function setCut(t) { if(t==='start') startP = video.currentTime; else endP = video.currentTime; }
    function applyCut() { if(startP!==-1 && endP!==-1) { cuts.push({s:Math.min(startP,endP), e:Math.max(startP,endP)}); startP=-1; endP=-1; } }
    function addAI() { aiMsgs.push({t:document.getElementById('aiText').value, time:video.currentTime, d:false}); document.getElementById('aiText').value=""; }

    function render() {
        if(document.getElementById('outroOn').checked && video.currentTime >= video.duration - 0.2 && video.duration > 0) {
            ctx.fillStyle = "black"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = (canvas.height/15)+"px Arial";
            ctx.fillText("Creator of song: TheFatRat", canvas.width/2, canvas.height/2-10);
            ctx.fillText("Name of song: Xenogenesis", canvas.width/2, canvas.height/2+30);
        } else {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        }
        cuts.forEach(c => { if(video.currentTime >= c.s && video.currentTime < c.e) video.currentTime = c.e; });
        aiMsgs.forEach(m => {
            if(video.currentTime >= m.time && !m.d && !video.paused) {
                let s = new SpeechSynthesisUtterance(m.t); s.lang = 'sr-RS'; window.speechSynthesis.speak(s); m.d = true;
            }
        });
        if(!video.paused) { seekbar.value = video.currentTime; document.getElementById('timer').innerText = video.currentTime.toFixed(1) + "s"; }
        requestAnimationFrame(render);
    }
    function togglePlay() { if(video.paused){ video.play(); audio.play(); } else { video.pause(); audio.pause(); } }
    function undo() { cuts.pop(); aiMsgs.pop(); }
    seekbar.oninput = () => { video.currentTime = seekbar.value; audio.currentTime = seekbar.value % (audio.duration || 1); };
    render();
</script>
</body>
</html>
