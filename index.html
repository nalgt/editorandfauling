<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Studio PRO</title>
    <!-- Firebase SDK (Biblioteke) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0e0e0e; color: white; margin: 0; text-align: center; overflow-x: hidden; }
        
        /* Login Ekran */
        #authOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { background: #1a1a1a; padding: 25px; border-radius: 15px; border: 1px solid #333; width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input[type="text"], input[type="password"] { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: #2a2a2a; color: white; font-size: 16px; }
        
        /* Editor Interfejs */
        .viewport { width: 100%; max-width: 600px; margin: auto; position: relative; background: #000; }
        canvas { width: 100%; display: block; border-bottom: 3px solid #f39c12; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; max-width: 600px; margin: auto; }
        button, label { background: #222; color: white; border: 1px solid #444; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; }
        button:active { transform: scale(0.95); background: #333; }
        
        .btn-rec { background: #e74c3c; grid-column: span 2; font-size: 18px; border: none; }
        .btn-rec.active { background: #c0392b; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        
        input[type="file"] { display: none; }
        .status-bar { font-size: 12px; color: #f39c12; margin-top: 5px; }
    </style>
</head>
<body>

<!-- POCETNI EKRAN (LOGIN/GUEST) -->
<div id="authOverlay">
    <h1 style="color:#f39c12; letter-spacing: 2px;">VIDEO STUDIO</h1>
    <div class="login-box">
        <input type="text" id="username" placeholder="Username (npr. gglolpro)">
        <input type="password" id="pass" placeholder="Password (npr. 67noob67)">
        <button onclick="handleAuth()" style="background:#f39c12; color:black; width:100%; margin-top:10px;">ULAZ / REGISTRACIJA</button>
    </div>
    <p style="color: #666;">ili</p>
    <button onclick="startAsGuest()" style="width:300px; background:#333; border:none;">NASTAVI KAO GOST</button>
    <p id="localMsg" style="font-size: 11px; color: #444; margin-top: 15px;"></p>
</div>

<!-- EDITOR -->
<div class="viewport">
    <div id="userInfo" class="status-bar"></div>
    <canvas id="editorCanvas"></canvas>
    <video id="vSource" autoplay muted playsinline style="display:none;"></video>
</div>

<div class="controls">
    <button id="recBtn" class="btn-rec">🔴 SNIMAJ VIDEO</button>
    
    <label for="videoInput">📂 UBACI VIDEO</label>
    <input type="file" id="videoInput" accept="video/*">
    
    <label for="stickerInput">🖼️ DODAJ SLIKU</label>
    <input type="file" id="stickerInput" accept="image/*">

    <button onclick="setFilter('grayscale(100%)')">CRNO-BELO</button>
    <button onclick="setFilter('sepia(100%)')">RETRO</button>
    <button onclick="changePitch('high')">VISOK GLAS</button>
    <button onclick="changePitch('low')">DUBOK GLAS</button>
    <button onclick="resetEditor()" style="grid-column: span 2; background: #111;">RESETOUJ EFEKTE</button>
</div>

<script>
    // 1. FIREBASE KONFIGURACIJA (Zameni sa svojim podacima iz Firebase konzole)
    const firebaseConfig = {
        apiKey: "TVOJ_API_KEY",
        authDomain: "TVOJ_://firebaseapp.com",
        projectId: "TVOJ_PROJEKAT",
        storageBucket: "TVOJ_://appspot.com",
        appId: "TVOJ_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const storage = firebase.storage();

    // 2. VARIJABLE
    const canvas = document.getElementById('editorCanvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('vSource');
    let recorder, chunks = [], isGuest = true, currentFilter = "none", stickerImg = new Image();
    let audioCtx, biquadFilter;

    // 3. PROVERA MEMORIJE TELEFONA (LocalStorage)
    window.onload = () => {
        const savedUser = localStorage.getItem('saved_user');
        const savedPass = localStorage.getItem('saved_pass');
        if (savedUser) {
            document.getElementById('username').value = savedUser;
            document.getElementById('pass').value = savedPass;
            document.getElementById('localMsg').innerText = "* Podaci za " + savedUser + " su učitani.";
        }
    };

    // 4. AUTH LOGIKA (Username -> Firebase Email trik)
    function startAsGuest() {
        isGuest = true;
        document.getElementById('authOverlay').style.display = 'none';
        document.getElementById('userInfo').innerText = "Režim: GOST (Nema čuvanja na nalog)";
        initCamera();
    }

    async function handleAuth() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('pass').value;

        if (user.length < 3) { alert("Username je prekratak!"); return; }

        const fakeEmail = user + "@video.studio"; // Pravimo email od username-a

        try {
            await auth.signInWithEmailAndPassword(fakeEmail, pass);
        } catch (e) {
            try {
                await auth.createUserWithEmailAndPassword(fakeEmail, pass);
            } catch (err) {
                alert("Greška: " + err.message); return;
            }
        }

        // Sačuvaj u memoriju telefona
        localStorage.setItem('saved_user', user);
        localStorage.setItem('saved_pass', pass);

        isGuest = false;
        document.getElementById('authOverlay').style.display = 'none';
        document.getElementById('userInfo').innerText = "Korisnik: " + user;
        initCamera();
    }

    // 5. KAMERA I ZVUK
    function initCamera() {
        navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
            video.srcObject = stream;
            setupAudio(stream);
            render();
        }).catch(err => alert("Kamera nije dostupna. Proveri dozvole u APK!"));
    }

    function setupAudio(stream) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaStreamSource(stream);
        biquadFilter = audioCtx.createBiquadFilter();
        biquadFilter.frequency.value = 1000;
        source.connect(biquadFilter);
        biquadFilter.connect(audioCtx.destination);
    }

    // 6. CRTANJE NA EKRAN (Editor)
    function render() {
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        ctx.filter = currentFilter;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        ctx.filter = "none";
        if (stickerImg.src) {
            ctx.drawImage(stickerImg, 40, 40, 120, 120);
        }
        requestAnimationFrame(render);
    }

    // 7. KONTROLE
    function setFilter(f) { currentFilter = f; }
    function changePitch(p) {
        if(!biquadFilter) return;
        biquadFilter.type = p === 'high' ? 'highpass' : 'lowpass';
        biquadFilter.frequency.value = p === 'high' ? 2500 : 500;
    }
    function resetEditor() {
        currentFilter = "none";
        stickerImg = new Image();
        if(biquadFilter) biquadFilter.frequency.value = 1000;
    }

    // 8. UBACIVANJE FAJLOVA
    document.getElementById('videoInput').onchange = (e) => {
        video.srcObject = null;
        video.src = URL.createObjectURL(e.target.files[0]);
        video.muted = false;
        video.play();
    };
    document.getElementById('stickerInput').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => { stickerImg.src = ev.target.result; };
        reader.readAsDataURL(e.target.files[0]);
    };

    // 9. SNIMANJE I FINALNO ČUVANJE
    const recBtn = document.getElementById('recBtn');
    recBtn.onclick = () => {
        if (recorder && recorder.state === "recording") {
            recorder.stop();
            recBtn.innerText = "🔴 SNIMAJ VIDEO";
            recBtn.classList.remove('active');
        } else {
            chunks = [];
            const stream = canvas.captureStream(30);
            recorder = new MediaRecorder(stream);
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = async () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                const fileName = `edit_${Date.now()}.mp4`;

                if (isGuest) {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = fileName; a.click();
                } else {
                    alert("Čuvam na tvoj Cloud nalog...");
                    const ref = storage.ref().child('users/' + auth.currentUser.uid + '/' + fileName);
                    await ref.put(blob);
                    alert("USPEŠNO: Video je sačuvan na tvom profilu!");
                }
            };
            recorder.start();
            recBtn.innerText = "⏹️ ZAUSTAVI I SAČUVAJ";
            recBtn.classList.add('active');
        }
    };
</script>
</body>
</html>
