<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GGLOL Pro - Ultimate Ripple Editor</title>
    <style>
        :root { --accent: #f39c12; --bg: #0b0b0b; --ai-color: #9b59b6; --cut-color: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; touch-action: manipulation; }
        
        #authOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align: center; }
        
        #preview-zone { flex: 1; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; overflow: hidden; }
        canvas { width: 95%; max-height: 50vh; object-fit: contain; background:#111; border-radius:10px; border: 2px solid #333; }
        
        #music-library { position: fixed; right: -300px; top: 0; width: 280px; height: 100%; background: #151515; z-index: 1000; transition: 0.3s; border-left: 2px solid var(--accent); padding: 15px; overflow-y: auto; }
        #music-library.open { right: 0; }
        .music-item { background: #222; padding: 15px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; border: 1px solid #333; }

        .toolbar { background:#111; padding:10px; display:grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap:5px; border-top: 1px solid #333; }
        button, label { background:#222; color:white; border:1px solid #444; padding:12px 5px; border-radius:8px; cursor:pointer; font-weight:bold; font-size:11px; text-align: center; text-transform: uppercase; }
        button:active { background:var(--accent); color:black; }

        #ai-box { background: #1a1a1a; padding: 10px; display: flex; gap: 5px; border-top: 1px solid #333; }
        #aiText { flex: 1; padding: 10px; border-radius: 5px; border: none; background: #333; color: white; }

        #timeline { height: 120px; background:#0a0a0a; overflow-x:auto; position:relative; border-top: 2px solid #222; }
        .track { height:30px; background:rgba(255,255,255,0.02); margin-bottom:2px; position:relative; width: 5000px; }
        .cut-zone { position: absolute; height: 100%; background: var(--cut-color); opacity: 0.5; pointer-events: none; }
        .ai-marker { position: absolute; height: 100%; width: 4px; background: var(--ai-color); border-radius: 2px; }
        #playhead { position:absolute; top:0; left:0; width:2px; height:100%; background:white; z-index:100; pointer-events:none; }
        #timer { font-family: monospace; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div id="authOverlay">
    <h1 style="color:var(--accent);">GGLOL PRO STUDIO</h1>
    <p>Spremi video i dodaj AI glas</p>
    <button onclick="appStart()" style="background:var(--accent); color:black; padding:20px 60px; border-radius:50px; font-size: 20px;">POKRENI EDITOR</button>
</div>

<div id="music-library">
    <button onclick="toggleMusic()" style="width:100%; background:#e74c3c; margin-bottom:15px;">ZATVORI</button>
    <div class="music-item" onclick="addSound('https://myinstants.com', 'Vine Boom')">🔊 Vine Boom</div>
    <div class="music-item" onclick="addSound('https://myinstants.com', 'Bruh')">🔊 Bruh</div>
</div>

<div id="preview-zone">
    <canvas id="mainCanvas"></canvas>
    <video id="vSource" style="display:none;" playsinline crossorigin="anonymous"></video>
    <div style="width:95%; display:flex; align-items:center; gap:10px; padding:5px;">
        <button onclick="togglePlay()" id="playBtn" style="min-width: 60px;">▶</button>
        <input type="range" id="seekbar" value="0" step="0.01" style="flex:1; accent-color:var(--accent);">
        <span id="timer">00:00</span>
    </div>
</div>

<div id="ai-box">
    <input type="text" id="aiText" placeholder="Šta AI da kaže...">
    <button onclick="addAIVoice()" style="background:var(--ai-color);">🎙️ DODAJ</button>
</div>

<div class="toolbar">
    <label for="vIn">📂 VIDEO</label>
    <input type="file" id="vIn" accept="video/*" style="display:none;">
    <button onclick="toggleMusic()" style="color:var(--accent);">🎶 ZVUK</button>
    <button onclick="setCutPoint('start')" style="color:var(--cut-color);">[ OD</button>
    <button onclick="setCutPoint('end')" style="color:var(--cut-color);">DO ]</button>
    <button onclick="applyCut()" style="background:white; color:black;">✂️ SEČI</button>
    <button onclick="toggleMute()" id="muteBtn">🔊 ON</button>
    <button onclick="undoLast()" style="background:#444;">↩️</button>
    <button onclick="normalExport()" style="background:#27ae60;">💾 SNIMI</button>
</div>

<div id="timeline">
    <div id="playhead"></div>
    <div class="track" id="vTrack"></div>
    <div class="track" id="cutTrack"></div>
    <div class="track" id="aiTrack"></div>
</div>

<script>
    const video = document.getElementById('vSource');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const seekbar = document.getElementById('seekbar');
    const playBtn = document.getElementById('playBtn');
    
    let cuts = [], aiSpeeches = [], activeSounds = [];
    let cutStart = -1, cutEnd = -1;

    async function appStart() {
        document.getElementById('authOverlay').style.display = 'none';
        render();
    }

    // --- VIDEO KONTROLA ---
    document.getElementById('vIn').onchange = (e) => {
        const file = e.target.files[0];
        video.src = URL.createObjectURL(file);
        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            seekbar.max = video.duration;
            updateUI();
        };
    };

    function togglePlay() {
        if (video.paused) { video.play(); playBtn.innerText = "⏸"; }
        else { video.pause(); playBtn.innerText = "▶"; }
    }

    function toggleMute() {
        video.muted = !video.muted;
        document.getElementById('muteBtn').innerText = video.muted ? "🔇 OFF" : "🔊 ON";
    }

    // --- AI VOICE LOGIKA ---
    function addAIVoice() {
        const txt = document.getElementById('aiText').value;
        if(!txt) return;
        aiSpeeches.push({ text: txt, time: video.currentTime, played: false });
        document.getElementById('aiText').value = "";
        updateUI();
    }

    function checkAI() {
        aiSpeeches.forEach(s => {
            if(video.currentTime >= s.time && !s.played && !video.paused) {
                let msg = new SpeechSynthesisUtterance(s.text);
                msg.lang = 'sr-RS'; 
                window.speechSynthesis.speak(msg);
                s.played = true;
            }
            if(video.currentTime < s.time) s.played = false;
        });
    }

    // --- RIPPLE CUT LOGIKA ---
    function setCutPoint(type) {
        if(type === 'start') cutStart = video.currentTime;
        else cutEnd = video.currentTime;
        updateUI();
    }

    function applyCut() {
        if(cutStart === -1 || cutEnd === -1) return;
        cuts.push({ start: Math.min(cutStart, cutEnd), end: Math.max(cutStart, cutEnd) });
        cutStart = -1; cutEnd = -1;
        updateUI();
    }

    function checkCuts() {
        cuts.forEach(c => {
            if(video.currentTime >= c.start && video.currentTime < c.end) {
                video.currentTime = c.end;
            }
        });
    }

    // --- UI I RENDER ---
    function updateUI() {
        const cTrack = document.getElementById('cutTrack');
        const aTrack = document.getElementById('aiTrack');
        const ph = document.getElementById('playhead');
        
        cTrack.innerHTML = ""; aTrack.innerHTML = "";
        const duration = video.duration || 1;

        // Playhead pozicija
        ph.style.left = (video.currentTime / duration * 100) + "%";
        document.getElementById('timer').innerText = video.currentTime.toFixed(1) + "s";

        // Rezovi
        cuts.forEach(c => {
            let div = document.createElement('div'); div.className = "cut-zone";
            div.style.left = (c.start / duration * 100) + "%";
            div.style.width = ((c.end - c.start) / duration * 100) + "%";
            cTrack.appendChild(div);
        });

        // AI Markeri
        aiSpeeches.forEach(s => {
            let div = document.createElement('div'); div.className = "ai-marker";
            div.style.left = (s.time / duration * 100) + "%";
            aTrack.appendChild(div);
        });
    }

    function render() {
        if(!video.paused || video.currentTime >= 0) {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            checkCuts();
            checkAI();
            updateUI();
        }
        requestAnimationFrame(render);
    }

    seekbar.oninput = () => { video.currentTime = seekbar.value; updateUI(); };

    function toggleMusic() { document.getElementById('music-library').classList.toggle('open'); }

    function undoLast() {
        if(cuts.length > 0) cuts.pop();
        else aiSpeeches.pop();
        updateUI();
    }

    // --- EKSPORT ---
    function normalExport() {
        alert("Eksport započet! Video će se pustiti od početka. Ne dirajte ništa dok se ne završi.");
        const stream = canvas.captureStream(30);
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        const chunks = [];
        
        video.currentTime = 0;
        video.play();
        recorder.start();

        video.onended = () => {
            recorder.stop();
            video.pause();
        };

        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'gglol_pro_edit.webm'; a.click();
        };
        recorder.ondataavailable = e => chunks.push(e.data);
    }
</script>

</body>
</html>
