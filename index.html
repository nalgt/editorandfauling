<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GGLOL Studio PRO - Final</title>
    <style>
        :root { --accent: #f39c12; --bg: #0b0b0b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #authOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        
        #preview-zone { flex: 1.5; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; }
        canvas { width: 95%; max-width: 900px; aspect-ratio: 16/9; background:#111; border-radius:10px; border: 2px solid #333; }
        
        #selection-overlay { position: absolute; height: 100%; background: rgba(231, 76, 60, 0.4); border-left: 2px solid #e74c3c; border-right: 2px solid #e74c3c; display: none; pointer-events: none; z-index: 50; }

        .toolbar { background:#111; padding:12px; display:flex; flex-wrap:wrap; gap:8px; justify-content:center; border-top: 1px solid #333; }
        button, label { background:#222; color:white; border:1px solid #444; padding:10px 14px; border-radius:6px; cursor:pointer; font-weight:bold; font-size:12px; }
        button:hover { background:var(--accent); color:black; }

        #timeline-container { height: 180px; background:#0a0a0a; overflow-x:auto; padding:10px; position:relative; border-top: 2px solid #222; }
        .track { height:35px; background:rgba(255,255,255,0.02); margin-bottom:5px; position:relative; border-radius:5px; border: 1px dashed #333; width: 4000px; }
        .marker { position: absolute; height: 100%; border-radius: 4px; display: flex; align-items: center; justify-content: space-between; font-size: 10px; color: white; cursor: move; }
        .resizer { width: 10px; height: 100%; background: rgba(0,0,0,0.3); cursor: ew-resize; }
        #playhead { position:absolute; top:0; left:0; width:2px; height:100%; background:red; z-index:100; pointer-events:none; }
        
        #exportLoading { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:10000; flex-direction:column; align-items:center; justify-content:center; }
    </style>
</head>
<body>

<div id="authOverlay">
    <h1 style="color:var(--accent);">STUDIO PRO</h1>
    <button onclick="appStart()" style="background:var(--accent); color:black; padding:15px 40px; border-radius:10px; font-weight:bold; cursor:pointer; border:none;">POKRENI</button>
</div>

<div id="exportLoading">
    <h2 style="color:var(--accent);">EXPORTIVANJE...</h2>
    <div style="width:70%; height:8px; background:#222; border-radius:4px; overflow:hidden;">
        <div id="exportProgress" style="width:0%; height:100%; background:var(--accent);"></div>
    </div>
    <p id="exportPerc">0%</p>
    <p style="font-size:12px; color:gray;">Molimo sačekajte da se video završi (Normalna brzina)</p>
</div>

<div id="preview-zone">
    <canvas id="mainCanvas"></canvas>
    <video id="vSource" style="display:none;" playsinline crossorigin="anonymous"></video>
    <div style="width:90%; display:flex; align-items:center; gap:10px; padding:10px;">
        <button onclick="togglePlay()">▶/⏸</button>
        <input type="range" id="seekbar" value="0" step="0.01" style="flex:1; accent-color:red;">
        <span id="timer">0:00</span>
    </div>
</div>

<div class="toolbar">
    <label for="vIn">📂 VIDEO</label><input type="file" id="vIn" accept="video/*" style="display:none;">
    <button onclick="addText()" style="background:#9b59b6;">➕ TEKST</button>
    <button onclick="setRangeStart()" style="background:#e74c3c;">📍 OD</button>
    <button onclick="setRangeEnd()" style="background:#e74c3c;">📍 DO</button>
    <button onclick="deleteRange()" style="background:white; color:red;">🗑️ OBRISI SELEKCIJU</button>
    <button onclick="normalExport()" style="background:#27ae60;">💾 SAČUVAJ VIDEO (NORMAL)</button>
</div>

<div id="timeline-container">
    <div id="selection-overlay"></div>
    <div id="playhead"></div>
    <div class="track" id="vTrack"></div>
    <div class="track" id="tTrack"></div>
    <div class="track" id="aTrack"></div>
</div>

<script>
    var video = document.getElementById('vSource');
    var canvas = document.getElementById('mainCanvas');
    var ctx = canvas.getContext('2d');
    var seekbar = document.getElementById('seekbar');
    var audioCtx, sourceNode, destNode, biquadFilter;
    var rangeStart = -1, rangeEnd = -1;
    var activeTexts = [], activeSounds = [];

    async function appStart() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        document.getElementById('authOverlay').style.display = 'none';
        render();
    }

    function setupAudio() {
        if (!sourceNode && audioCtx) {
            video.crossOrigin = "anonymous";
            sourceNode = audioCtx.createMediaElementSource(video);
            destNode = audioCtx.createMediaStreamDestination();
            biquadFilter = audioCtx.createBiquadFilter();
            
            sourceNode.connect(biquadFilter);
            biquadFilter.connect(audioCtx.destination);
            biquadFilter.connect(destNode);
        }
    }

    document.getElementById('vIn').onchange = (e) => {
        video.src = URL.createObjectURL(e.target.files[0]);
        video.onloadeddata = () => { seekbar.max = video.duration; canvas.width = 1280; canvas.height = 720; updateTimeline(); };
    };

    function setRangeStart() { rangeStart = video.currentTime; updateSelectionUI(); }
    function setRangeEnd() { rangeEnd = video.currentTime; updateSelectionUI(); }

    function updateSelectionUI() {
        const overlay = document.getElementById('selection-overlay');
        if (rangeStart !== -1 && rangeEnd !== -1) {
            let s = Math.min(rangeStart, rangeEnd), e = Math.max(rangeStart, rangeEnd);
            overlay.style.display = 'block';
            overlay.style.left = (s / video.duration * 100) + "%";
            overlay.style.width = ((e - s) / video.duration * 100) + "%";
        }
    }

    function deleteRange() {
        if (rangeStart === -1 || rangeEnd === -1) return alert("Izaberi OD i DO!");
        let s = Math.min(rangeStart, rangeEnd), e = Math.max(rangeStart, rangeEnd);
        activeTexts = activeTexts.filter(t => t.start < s || t.start > e);
        rangeStart = -1; rangeEnd = -1;
        document.getElementById('selection-overlay').style.display = 'none';
        updateTimeline();
    }

    function render() {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        activeTexts.forEach(t => {
            if(video.currentTime >= t.start && video.currentTime <= t.start + t.duration) {
                ctx.fillStyle = "white"; ctx.font = "bold 60px sans-serif";
                ctx.textAlign = "center"; ctx.fillText(t.content, canvas.width/2, 620);
            }
        });
        requestAnimationFrame(render);
    }

    function togglePlay() { video.paused ? video.play() : video.pause(); }
    seekbar.oninput = () => video.currentTime = seekbar.value;
    video.ontimeupdate = () => {
        seekbar.value = video.currentTime;
        document.getElementById('playhead').style.left = (video.currentTime / video.duration * 100) + "%";
        document.getElementById('timer').innerText = Math.floor(video.currentTime) + "s";
    };

    function addText() {
        let val = prompt("Tekst:");
        if(val) { activeTexts.push({ content: val, start: video.currentTime, duration: 3 }); updateTimeline(); }
    }

    function updateTimeline() {
        const tTrack = document.getElementById('tTrack');
        tTrack.innerHTML = "";
        activeTexts.forEach((t, i) => {
            let m = document.createElement('div');
            m.className = "marker"; m.style.left = (t.start / video.duration * 100) + "%";
            m.style.width = (t.duration / video.duration * 100) + "%"; m.style.background = "#9b59b6";
            m.innerHTML = `<div class="resizer"></div><span style="flex:1;text-align:center">X</span>`;
            m.onclick = (e) => { if(e.target.innerText === "X") { activeTexts.splice(i, 1); updateTimeline(); } };
            tTrack.appendChild(m);
        });
    }

    // NORMAL EXPORT (1x Brzina, Siguran Zvuk)
    async function normalExport() {
        setupAudio();
        const loading = document.getElementById('exportLoading');
        loading.style.display = 'flex';
        
        video.currentTime = 0;
        video.playbackRate = 1.0; // Normalna brzina

        const stream = new MediaStream([
            ...canvas.captureStream(30).getTracks(),
            ...destNode.stream.getTracks()
        ]);

        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        let chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'Studio_Normal_Edit.mp4'; a.click();
            loading.style.display = 'none';
        };

        recorder.start();
        video.play();

        const progressInt = setInterval(() => {
            let p = Math.floor((video.currentTime / video.duration) * 100);
            document.getElementById('exportProgress').style.width = p + "%";
            document.getElementById('exportPerc').innerText = p + "%";
            if(video.ended) { clearInterval(progressInt); recorder.stop(); }
        }, 100);
    }
</script>
</body>
</html>
