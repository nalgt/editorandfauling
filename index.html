<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Studio PRO</title>
    
    <!-- FIX: Firebase biblioteke moraju biti ovde -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    
    <style>
        body { font-family: sans-serif; background: #0e0e0e; color: white; margin: 0; text-align: center; }
        #authOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { background: #1a1a1a; padding: 25px; border-radius: 15px; width: 280px; }
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: #2a2a2a; color: white; }
        .viewport { width: 100%; max-width: 600px; margin: auto; }
        canvas { width: 100%; border-bottom: 3px solid #f39c12; background: #000; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; max-width: 600px; margin: auto; }
        button, label { background: #222; color: white; border: 1px solid #444; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-rec { background: #e74c3c; grid-column: span 2; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div id="authOverlay">
    <h1>VIDEO STUDIO</h1>
    <div class="login-box">
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="handleAuth()" style="background:#f39c12; color:black; width:100%;">LOGIN</button>
    </div>
    <p>ili</p>
    <button onclick="startAsGuest()" style="width:280px;">GOST</button>
</div>

<div class="viewport">
    <div id="userInfo" style="color:#f39c12; padding:5px;"></div>
    <canvas id="editorCanvas"></canvas>
    <video id="vSource" autoplay muted playsinline style="display:none;"></video>
</div>

<div class="controls">
    <button id="recBtn" class="btn-rec">🔴 SNIMAJ</button>
    <button onclick="startScreenShare()" style="grid-column: span 2; background:#9b59b6;">🖥️ EKRAN</button>
    <label for="videoInput">📂 VIDEO</label>
    <input type="file" id="videoInput" accept="video/*">
    <label for="stickerInput">🖼️ SLIKA</label>
    <input type="file" id="stickerInput" accept="image/*">
    <button onclick="setFilter('grayscale(100%)')">B&W</button>
    <button onclick="setFilter('sepia(100%)')">RETRO</button>
    <button onclick="resetEditor()" style="grid-column: span 2;">RESET</button>
</div>

<script>
    // 1. VARIJABLE ODMAH NA STARTU (Popravlja initialization error)
    var isGuest = true;
    var recorder, chunks = [], currentFilter = "none", stickerImg = new Image();
    var audioCtx, biquadFilter, auth, storage, currentStream;

    // 2. FIREBASE SETUP
    const firebaseConfig = {
        apiKey: "TVOJ_API_KEY",
        authDomain: "TVOJ_://firebaseapp.com",
        projectId: "TVOJ_PROJEKAT",
        storageBucket: "TVOJ_://appspot.com",
        appId: "TVOJ_APP_ID"
    };

    // Provera da li je firebase učitan
    if (typeof firebase !== 'undefined') {
        firebase.initializeApp(firebaseConfig);
        auth = firebase.auth();
        storage = firebase.storage();
    }

    const canvas = document.getElementById('editorCanvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('vSource');

    // 3. FUNKCIJE
    function startAsGuest() {
        isGuest = true;
        document.getElementById('authOverlay').style.display = 'none';
        initCamera();
    }

    async function handleAuth() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('pass').value;
        const fakeEmail = user + "@video.studio";
        
        try {
            await auth.signInWithEmailAndPassword(fakeEmail, pass);
        } catch (e) {
            await auth.createUserWithEmailAndPassword(fakeEmail, pass);
        }
        
        isGuest = false;
        document.getElementById('authOverlay').style.display = 'none';
        initCamera();
    }

    async function initCamera() {
        try {
            currentStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            video.srcObject = currentStream;
            render();
        } catch (err) { alert("Kamera nije dostupna!"); }
    }

    async function startScreenShare() {
        currentStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
        video.srcObject = currentStream;
    }

    function render() {
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        ctx.filter = currentFilter;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        ctx.filter = "none";
        if (stickerImg.src) ctx.drawImage(stickerImg, 40, 40, 100, 100);
        requestAnimationFrame(render);
    }

    function setFilter(f) { currentFilter = f; }
    function resetEditor() { currentFilter = "none"; stickerImg = new Image(); initCamera(); }

    document.getElementById('videoInput').onchange = (e) => {
        video.srcObject = null;
        video.src = URL.createObjectURL(e.target.files[0]);
        video.play();
    };

    document.getElementById('stickerInput').onchange = (e) => {
        const r = new FileReader();
        r.onload = (ev) => { stickerImg.src = ev.target.result; };
        r.readAsDataURL(e.target.files[0]);
    };

    // SNIMANJE
    const recBtn = document.getElementById('recBtn');
    recBtn.onclick = () => {
        if (recorder && recorder.state === "recording") {
            recorder.stop();
            recBtn.innerText = "🔴 SNIMAJ";
        } else {
            chunks = [];
            const stream = canvas.captureStream(30);
            recorder = new MediaRecorder(stream);
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'snimak.mp4';
                a.click();
            };
            recorder.start();
            recBtn.innerText = "⏹️ STOP";
        }
    };
</script>
</body>
</html>
