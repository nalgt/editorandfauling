<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GGLOL Pro Studio - Silent Edition</title>
    <style>
        :root { --accent: #f39c12; --bg: #0b0b0b; --cut: #e74c3c; --ai: #9b59b6; --layer: #2ecc71; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; touch-action: none; }
        #authOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        #preview-zone { flex: 1; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; }
        canvas { width: 95%; max-height: 35vh; background:#111; border-radius:10px; border: 2px solid #333; }
        .toolbar { background:#111; padding:8px; display:grid; grid-template-columns: repeat(4, 1fr); gap:5px; border-top: 1px solid #333; }
        button, label { background:#222; color:white; border:1px solid #444; padding:10px 2px; border-radius:8px; cursor:pointer; font-weight:bold; font-size:10px; text-align: center; }
        #control-panel { background: #1a1a1a; padding: 10px; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; font-size: 11px; border-top: 1px solid #333; }
        input[type="number"] { width: 40px; background: #333; color: white; border: 1px solid #555; padding: 5px; border-radius: 4px; }
        .mute-active { background: #e74c3c !important; color: white !important; }
    </style>
</head>
<body>

<div id="authOverlay">
    <h1 style="color:var(--accent);">GGLOL PRO STUDIO</h1>
    <button onclick="appStart()" style="background:var(--accent); color:black; padding:15px 45px; border-radius:30px; font-weight:bold;">KRENI</button>
</div>

<div id="preview-zone">
    <canvas id="mainCanvas"></canvas>
    <video id="vSource" style="display:none;" playsinline crossorigin="anonymous"></video>
    <video id="vLayer" style="display:none;" playsinline crossorigin="anonymous" loop></video>
    <div style="width:90%; display:flex; align-items:center; gap:10px; padding:10px;">
        <button onclick="togglePlay()" id="playBtn">▶</button>
        <input type="range" id="seekbar" value="0" step="0.01" style="flex:1;">
        <span id="timer">0.0s</span>
    </div>
</div>

<div id="control-panel">
    <label><input type="checkbox" id="outroEnable"> OUTRO EKRAN</label>
    <button onclick="toggleGlobalMute()" id="globalMuteBtn" class="mute-active">🔇 MUZIKA: ISKLJUČENA</button>
    <span>OUTRO (sek):</span>
    <input type="number" id="outroTime" value="3" min="1">
</div>

<div class="toolbar">
    <label for="vIn">📂 GLAVNI VID</label>
    <input type="file" id="vIn" accept="video/*" style="display:none;">
    <label for="vLayIn" style="color:var(--layer);">➕ SLOJ</label>
    <input type="file" id="vLayIn" accept="video/*" style="display:none;">
    <button onclick="video.currentTime = 0">🔄 RESTART</button>
    <button onclick="alert('Snimanje bez muzike spremno!')" style="background:var(--layer); color:black;">💾 SNIMI</button>
</div>

<script>
    const video = document.getElementById('vSource');
    const layer = document.getElementById('vLayer');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const seekbar = document.getElementById('seekbar');
    
    let isMuted = true; // Početno stanje: Muzika isključena
    let overlay = { x: 50, y: 50, w: 180, h: 120, active: false };

    function appStart() { 
        document.getElementById('authOverlay').style.display = 'none'; 
        applyMuteState();
        render(); 
    }

    function toggleGlobalMute() {
        isMuted = !isMuted;
        applyMuteState();
    }

    function applyMuteState() {
        video.muted = isMuted;
        layer.muted = isMuted;
        const btn = document.getElementById('globalMuteBtn');
        if(isMuted) {
            btn.innerText = "🔇 MUZIKA: ISKLJUČENA";
            btn.classList.add('mute-active');
        } else {
            btn.innerText = "🔊 MUZIKA: UKLJUČENA";
            btn.classList.remove('mute-active');
        }
    }

    document.getElementById('vIn').onchange = (e) => {
        video.src = URL.createObjectURL(e.target.files[0]);
        video.onloadedmetadata = () => { canvas.width = 1280; canvas.height = 720; seekbar.max = video.duration; };
    };

    document.getElementById('vLayIn').onchange = (e) => {
        layer.src = URL.createObjectURL(e.target.files[0]);
        overlay.active = true; 
        layer.play();
    };

    function render() {
        ctx.fillStyle = "black";
        ctx.fillRect(0,0,canvas.width, canvas.height);
        
        const showOutro = document.getElementById('outroEnable').checked;

        if(showOutro && video.currentTime >= video.duration - 0.1 && video.duration > 0) {
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.font = "bold 35px Arial";
            ctx.fillText("Creator of song: TheFatRat", canvas.width/2, canvas.height/2 - 20);
            ctx.font = "30px Arial";
            ctx.fillText("Name of song: Xenogenesis", canvas.width/2, canvas.height/2 + 40);
        } else {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            if(overlay.active) ctx.drawImage(layer, overlay.x, overlay.y, overlay.w, overlay.h);
        }

        if(!video.paused) {
            seekbar.value = video.currentTime;
            document.getElementById('timer').innerText = video.currentTime.toFixed(1) + "s";
        }
        requestAnimationFrame(render);
    }

    function togglePlay() { 
        if(video.paused) { video.play(); if(overlay.active) layer.play(); } 
        else { video.pause(); layer.pause(); } 
    }

    seekbar.oninput = () => video.currentTime = seekbar.value;
</script>
</body>
</html>
